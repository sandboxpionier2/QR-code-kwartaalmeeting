<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Check-in dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="admin">
  <main class="wrap">
    <div class="admin-shell">

      <div id="login-view" class="login-wrap" style="display:none">
        <h1 style="margin-top:0">Organisatie login</h1>
        <label for="pw">Wachtwoord</label>
        <input id="pw" type="password" autocomplete="current-password" />
        <button class="primary" id="loginBtn" style="width:100%">Inloggen</button>
        <p id="loginError" class="status error" style="display:none; margin-top:12px"></p>
      </div>

      <div id="dashboard-view" style="display:none">
        <div class="admin-header">
          <div>
            <h1>Check-in dashboard</h1>
            <div class="muted">Meeting: <span id="meetingLabel"></span> · <span id="lastUpdate"></span></div>
          </div>
          <div class="actions">
            <button class="secondary" id="refreshBtn">Ververs</button>
            <a class="secondary" id="qrLink" href="/admin/qr" target="_blank" rel="noopener">QR-printpagina openen</a>
            <button class="secondary" id="logoutBtn">Uitloggen</button>
          </div>
        </div>

        <div class="table-wrap" style="margin-bottom: 16px; padding: 14px 16px;">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap;">
            <div style="font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:600;">Gedeelde check-in URL</div>
            <button class="secondary" id="copySharedUrlBtn" type="button">Kopieer check-in URL</button>
          </div>
          <div id="sharedUrl" style="margin-top:6px; word-break:break-all; font-size:15px;"></div>
          <div id="copySharedUrlStatus" style="margin-top:8px; color:var(--muted); font-size:13px;"></div>
        </div>

        <div class="table-wrap checklist-wrap" style="margin-bottom: 16px; padding: 14px 16px;">
          <div class="checklist-head">
            <div style="font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:600;">Event-day checklist</div>
            <button class="secondary" id="resetChecklistBtn" type="button">Reset checklist</button>
          </div>
          <div id="checklistProgress" class="checklist-progress"></div>
          <div id="eventChecklist" class="event-checklist"></div>
        </div>

        <div id="stats" class="stats-grid"></div>

        <div style="margin:16px 0 8px; display:flex; gap:8px; align-items:center">
          <input id="filterInput" type="search" placeholder="Zoek op naam…" style="flex:1; padding:10px 12px; border-radius:8px; border:1px solid var(--border); font-size:14px" />
          <select id="workshopFilter" style="padding:10px 12px; border-radius:8px; border:1px solid var(--border); font-size:14px">
            <option value="">Alle workshops</option>
          </select>
          <select id="statusFilter" style="padding:10px 12px; border-radius:8px; border:1px solid var(--border); font-size:14px">
            <option value="">Alle status</option>
            <option value="in">Alleen ingecheckt</option>
            <option value="out">Nog niet ingecheckt</option>
          </select>
        </div>

        <div class="table-wrap">
          <table class="participants" id="participantsTable">
            <thead>
              <tr>
                <th>Naam</th>
                <th>Workshop</th>
                <th>Status</th>
                <th>Check-in tijd</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <script>
    var STORAGE_KEY = 'checkin-admin-pw';
    var CHECKLIST_STORAGE_KEY = 'checkin-event-checklist-v1';
    var CHECKLIST_ITEMS = [
      { id: 'print_qr', label: 'QR-printpagina geopend en QR geprint/opgeslagen' },
      { id: 'share_qr', label: 'Gedeelde QR zichtbaar op locatie of gedeeld met collega\'s' },
      { id: 'test_scan', label: 'Testscan uitgevoerd (scan > naam kiezen > ticket zichtbaar)' },
      { id: 'dashboard_live', label: 'Dashboard open op organisatie-laptop/tablet' },
      { id: 'network_ready', label: 'Internetverbinding gecontroleerd op locatie' }
    ];
    var state = { participants: [], workshops: [], stats: null, meetingId: '', sharedCheckinUrl: '' };

    function $(id) { return document.getElementById(id); }

    function getPw() {
      try { return sessionStorage.getItem(STORAGE_KEY) || ''; } catch { return ''; }
    }
    function setPw(pw) {
      try { sessionStorage.setItem(STORAGE_KEY, pw); } catch {}
    }
    function clearPw() {
      try { sessionStorage.removeItem(STORAGE_KEY); } catch {}
    }
    function getChecklistKey() {
      return CHECKLIST_STORAGE_KEY + ':' + (state.meetingId || 'default');
    }
    function loadChecklistState() {
      try {
        return JSON.parse(localStorage.getItem(getChecklistKey()) || '{}');
      } catch {
        return {};
      }
    }
    function saveChecklistState(checklistState) {
      try {
        localStorage.setItem(getChecklistKey(), JSON.stringify(checklistState || {}));
      } catch {}
    }

    function authHeaders(extra) {
      var h = Object.assign({ 'x-admin-password': getPw() }, extra || {});
      return h;
    }

    function showLogin(errorMsg) {
      $('login-view').style.display = '';
      $('dashboard-view').style.display = 'none';
      var e = $('loginError');
      if (errorMsg) { e.style.display = ''; e.textContent = errorMsg; }
      else { e.style.display = 'none'; }
    }

    function showDashboard() {
      $('login-view').style.display = 'none';
      $('dashboard-view').style.display = '';
    }

    function tryLoadDashboard() {
      if (!getPw()) { showLogin(); return; }
      fetchData().then(function (ok) {
        if (ok) showDashboard();
      });
    }

    function fetchData() {
      return fetch('/api/admin/participants', { headers: authHeaders() })
        .then(function (r) {
          if (r.status === 401) {
            clearPw();
            showLogin('Onjuist wachtwoord.');
            return false;
          }
          return r.json().then(function (data) {
            state.participants = data.participants || [];
            state.workshops = data.workshops || [];
            state.stats = data.stats || null;
            state.meetingId = data.meetingId || '';
            state.sharedCheckinUrl = data.sharedCheckinUrl || '';
            render();
            return true;
          });
        })
        .catch(function () {
          showLogin('Kan server niet bereiken.');
          return false;
        });
    }

    function render() {
      $('meetingLabel').textContent = state.meetingId;
      $('lastUpdate').textContent = 'Laatst bijgewerkt: ' + new Date().toLocaleTimeString('nl-NL');
      $('sharedUrl').textContent = state.sharedCheckinUrl || 'Niet beschikbaar';
      renderChecklist();

      // Stats
      var s = state.stats || { totalParticipants: 0, totalCheckedIn: 0, byWorkshop: [] };
      var pct = s.totalParticipants ? Math.round((s.totalCheckedIn / s.totalParticipants) * 100) : 0;

      var cards = [];
      cards.push(statCard('Ingecheckt', s.totalCheckedIn + ' / ' + s.totalParticipants, pct));
      (s.byWorkshop || []).forEach(function (w) {
        var p = w.totalAssigned ? Math.round((w.totalCheckedIn / w.totalAssigned) * 100) : 0;
        cards.push(statCard(w.workshopName, w.totalCheckedIn + ' / ' + w.totalAssigned, p));
      });
      $('stats').innerHTML = cards.join('');

      // Workshop filter options
      var wsSel = $('workshopFilter');
      var current = wsSel.value;
      wsSel.innerHTML = '<option value="">Alle workshops</option>' +
        state.workshops.map(function (w) {
          return '<option value="' + escAttr(w.id) + '">' + escHtml(w.name) + '</option>';
        }).join('');
      wsSel.value = current;

      renderRows();
    }

    function renderChecklist() {
      var checklistState = loadChecklistState();
      var doneCount = 0;
      var html = CHECKLIST_ITEMS.map(function (item) {
        var done = !!checklistState[item.id];
        if (done) doneCount += 1;
        return '<label class="checklist-item">' +
          '<input type="checkbox" data-check-id="' + escAttr(item.id) + '"' + (done ? ' checked' : '') + ' />' +
          '<span>' + escHtml(item.label) + '</span>' +
          '</label>';
      }).join('');

      $('eventChecklist').innerHTML = html;
      $('checklistProgress').textContent = doneCount + ' / ' + CHECKLIST_ITEMS.length + ' afgerond';

      var checkboxes = $('eventChecklist').querySelectorAll('input[type="checkbox"]');
      checkboxes.forEach(function (input) {
        input.addEventListener('change', function () {
          var id = input.getAttribute('data-check-id');
          var next = loadChecklistState();
          next[id] = !!input.checked;
          saveChecklistState(next);
          renderChecklist();
        });
      });
    }

    function renderRows() {
      var q = ($('filterInput').value || '').toLowerCase().trim();
      var wsId = $('workshopFilter').value;
      var status = $('statusFilter').value;
      var rows = state.participants.filter(function (p) {
        if (q && (p.name || '').toLowerCase().indexOf(q) === -1) return false;
        if (wsId && p.assignedWorkshopId !== wsId) return false;
        if (status === 'in' && !p.checkedInAt) return false;
        if (status === 'out' && p.checkedInAt) return false;
        return true;
      });

      var tbody = $('participantsTable').querySelector('tbody');
      tbody.innerHTML = rows.map(function (p) {
        var statusPill = p.checkedInAt
          ? '<span class="pill ok">Ingecheckt</span>'
          : '<span class="pill pending">Wacht</span>';
        var time = p.checkedInAt ? new Date(p.checkedInAt).toLocaleTimeString('nl-NL') : '—';
        return '<tr>' +
          '<td>' + escHtml(p.name) + '</td>' +
          '<td>' + escHtml(p.assignedWorkshopName || '—') + '</td>' +
          '<td>' + statusPill + '</td>' +
          '<td>' + time + '</td>' +
          '</tr>';
      }).join('');
    }

    function statCard(label, value, pct) {
      return (
        '<div class="stat-card">' +
          '<div class="label">' + escHtml(label) + '</div>' +
          '<div class="value">' + escHtml(value) + '</div>' +
          '<div class="bar"><span style="width:' + Math.max(0, Math.min(100, pct)) + '%"></span></div>' +
        '</div>'
      );
    }

    function escHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escAttr(s) {
      return escHtml(s).replace(/"/g, '&quot;');
    }

    // Wire up
    $('loginBtn').addEventListener('click', function () {
      var pw = $('pw').value;
      if (!pw) { showLogin('Vul een wachtwoord in.'); return; }
      setPw(pw);
      tryLoadDashboard();
    });
    $('pw').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') $('loginBtn').click();
    });
    $('logoutBtn').addEventListener('click', function () {
      clearPw();
      showLogin();
    });
    $('refreshBtn').addEventListener('click', fetchData);
    $('copySharedUrlBtn').addEventListener('click', function () {
      var url = state.sharedCheckinUrl || '';
      if (!url) {
        $('copySharedUrlStatus').textContent = 'Geen check-in URL beschikbaar.';
        return;
      }

      function setCopyStatus(text) {
        $('copySharedUrlStatus').textContent = text;
      }

      if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
        navigator.clipboard.writeText(url)
          .then(function () {
            setCopyStatus('URL gekopieerd.');
          })
          .catch(function () {
            setCopyStatus('Kopieren mislukt, kopieer handmatig.');
          });
      } else {
        try {
          var helper = document.createElement('textarea');
          helper.value = url;
          helper.setAttribute('readonly', '');
          helper.style.position = 'absolute';
          helper.style.left = '-9999px';
          document.body.appendChild(helper);
          helper.select();
          document.execCommand('copy');
          document.body.removeChild(helper);
          setCopyStatus('URL gekopieerd.');
        } catch {
          setCopyStatus('Kopieren mislukt, kopieer handmatig.');
        }
      }
    });
    $('resetChecklistBtn').addEventListener('click', function () {
      saveChecklistState({});
      renderChecklist();
    });
    ['filterInput', 'workshopFilter', 'statusFilter'].forEach(function (id) {
      $(id).addEventListener('input', renderRows);
      $(id).addEventListener('change', renderRows);
    });

    // Auto-refresh iedere 15s
    setInterval(function () {
      if (getPw() && $('dashboard-view').style.display !== 'none') fetchData();
    }, 15000);

    tryLoadDashboard();
  </script>
</body>
</html>
