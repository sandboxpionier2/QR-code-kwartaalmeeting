<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Welkom bij de kwartaalmeeting</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="checkin-theme">
  <canvas id="duckMatrixCanvas" aria-hidden="true" class="duck-matrix-canvas"></canvas>
  <div class="floating-ducks" aria-hidden="true">
    <img src="/duck.png" alt="" class="floating-duck duck-a" />
    <img src="/duck.png" alt="" class="floating-duck duck-b" />
    <img src="/duck.png" alt="" class="floating-duck duck-c" />
  </div>

  <main class="wrap checkin-wrap">
    <div id="view"></div>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var token = (params.get('token') || '').trim();
      var view = document.getElementById('view');

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function renderError(title, body) {
        view.innerHTML =
          '<div class="card error invite-card">' +
            '<div class="big-icon">⚠️</div>' +
            '<h1>' + esc(title) + '</h1>' +
            '<p>' + esc(body) + '</p>' +
          '</div>';
      }

      function renderHero(title, intro, meta) {
        var heroMeta = meta || {};
        var dateText = heroMeta.date || '12 mei 2026';
        var timeText = heroMeta.time || '08:45 - 13:00';
        var locationText = heroMeta.location || 'Stadskazerne';
        // Logo wordt na render verwerkt via stripWhiteBorder (id hero-logo-img)
        setTimeout(function() {
          var el = document.getElementById('hero-logo-img');
          if (el) applyStrippedSrc(el, '/logo.png');
        }, 0);
        return (
          '<div class="invite-hero">' +
            '<img id="hero-logo-img" src="/logo.png" alt="Kwartaalmeeting logo" class="hero-logo" />' +
            '<p class="eyebrow">Kwartaalmeeting bedrijfsvoering</p>' +
            '<h1>' + esc(title) + '</h1>' +
            (intro ? '<p class="small hero-intro">' + esc(intro) + '</p>' : '') +
            '<div class="hero-meta">' +
              '<span class="meta-pill">📅 ' + esc(dateText) + '</span>' +
              '<span class="meta-pill">🕘 ' + esc(timeText) + '</span>' +
              '<span class="meta-pill">📍 ' + esc(locationText) + '</span>' +
            '</div>' +
          '</div>'
        );
      }

      function getWorkshopDetails(info) {
        var workshopId = String(info.assignedWorkshopId || '').toLowerCase();
        if (workshopId === 'dienstverlening') {
          return {
            location: 'Stomme van Campen',
            extraInfo: 'Dit is een externe ruimte. Zie de afbeelding voor de route.',
            routeImageSrc: '/route-zilverveer.png',
            routeImageAlt: 'Looproute naar Stomme van Campen',
          };
        }
        if (workshopId === 'innovatie') {
          return {
            location: 'Johan van Mulkenzaal',
            extraInfo: 'Deze zaal bevindt zich op deze verdieping. Loop door de deuren rechtdoor en je bent er.',
            routeImageSrc: '',
            routeImageAlt: '',
          };
        }
        if (workshopId === 'datafin') {
          return {
            location: 'Dirk van Sliedregtzaal',
            extraInfo: 'Dat is de zaal waar jij je nu bevindt.',
            routeImageSrc: '',
            routeImageAlt: '',
          };
        }
        return { location: '', extraInfo: '', routeImageSrc: '', routeImageAlt: '' };
      }

      // Exact overgenomen uit Uitnodiging-kwartaalmeeting/src/lib/stripWhiteBorder.ts
      function stripWhiteBorderToDataUrl(src, whiteThreshold) {
        whiteThreshold = whiteThreshold || 245;
        return new Promise(function(resolve, reject) {
          var img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = function() {
            var width = img.naturalWidth || img.width;
            var height = img.naturalHeight || img.height;
            var offscreen = document.createElement('canvas');
            offscreen.width = width;
            offscreen.height = height;
            var ctx = offscreen.getContext('2d', { willReadFrequently: true });
            if (!ctx) { resolve(src); return; }
            ctx.drawImage(img, 0, 0, width, height);
            var imageData = ctx.getImageData(0, 0, width, height);
            var data = imageData.data;
            var w = width, h = height;
            var visited = new Uint8Array(w * h);
            var toProcess = [];
            function pushIfSeed(x, y) {
              if (x < 0 || x >= w || y < 0 || y >= h) return;
              var idx = y * w + x;
              if (visited[idx]) return;
              var p = idx * 4;
              if (data[p+3] === 0) { visited[idx] = 1; return; }
              if (data[p] >= whiteThreshold && data[p+1] >= whiteThreshold && data[p+2] >= whiteThreshold) {
                visited[idx] = 1; toProcess.push(idx);
              }
            }
            pushIfSeed(0, 0); pushIfSeed(w-1, 0); pushIfSeed(0, h-1); pushIfSeed(w-1, h-1);
            while (toProcess.length > 0) {
              var idx = toProcess.pop();
              var p = idx * 4;
              if (data[p] >= whiteThreshold && data[p+1] >= whiteThreshold && data[p+2] >= whiteThreshold) {
                data[p+3] = 0;
              }
              var x = idx % w, y = Math.floor(idx / w);
              function tryNeighbour(n) {
                if (!visited[n]) {
                  visited[n] = 1;
                  var np = n * 4;
                  if (data[np+3] !== 0 && data[np] >= whiteThreshold && data[np+1] >= whiteThreshold && data[np+2] >= whiteThreshold) {
                    toProcess.push(n);
                  }
                }
              }
              if (x > 0)   tryNeighbour(idx - 1);
              if (x < w-1) tryNeighbour(idx + 1);
              if (y > 0)   tryNeighbour(idx - w);
              if (y < h-1) tryNeighbour(idx + w);
            }
            ctx.putImageData(imageData, 0, 0);
            resolve(offscreen.toDataURL('image/png'));
          };
          img.onerror = function() { resolve(src); };
          img.src = src;
        });
      }

      function applyStrippedSrc(imgEl, src) {
        stripWhiteBorderToDataUrl(src, 245).then(function(dataUrl) {
          imgEl.src = dataUrl;
        });
      }

      // Pas floating ducks aan zodra DOM klaar is
      applyStrippedSrc(document.querySelector('.duck-a'), '/duck.png');
      applyStrippedSrc(document.querySelector('.duck-b'), '/duck.png');
      applyStrippedSrc(document.querySelector('.duck-c'), '/duck.png');

      function startDuckMatrix() {
        var canvas = document.getElementById('duckMatrixCanvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');

        function setCanvasSize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        setCanvasSize();

        var chars = ['0', 'DUCK'];
        var fontSize = 24;
        var drops = [];

        var duckImg = new Image();
        duckImg.crossOrigin = 'anonymous';
        stripWhiteBorderToDataUrl('/duck.png', 245).then(function(dataUrl) {
          duckImg.src = dataUrl;
        });
        duckImg.src = '/duck.png'; // fallback zodat canvas meteen kan beginnen

        function resetDrops() {
          var columns = Math.floor(canvas.width / fontSize) + 1;
          drops = [];
          for (var x = 0; x < columns; x++) {
            drops[x] = Math.random() * -100;
          }
        }
        resetDrops();

        function draw() {
          ctx.fillStyle = 'rgba(0, 21, 43, 0.1)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.font = fontSize + 'px monospace';

          for (var i = 0; i < drops.length; i++) {
            var text = chars[Math.floor(Math.random() * chars.length)];
            if (text === 'DUCK') {
              if (duckImg.complete && duckImg.naturalWidth > 0) {
                ctx.drawImage(duckImg, i * fontSize, drops[i] * fontSize - fontSize * 0.8, fontSize, fontSize);
              }
            } else {
              ctx.fillStyle = '#009BDF';
              ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            }
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
              drops[i] = 0;
            }
            drops[i]++;
          }
        }

        var interval = setInterval(draw, 50);

        window.addEventListener('resize', function() {
          setCanvasSize();
          resetDrops();
        });
      }

      function renderWelcome(info, statusText, statusClass, resetData) {
        var workshopDetails = getWorkshopDetails(info || {});
        view.innerHTML =
          '<div class="card welcome invite-card">' +
            renderHero(
              'Nulletjes & Eendjes',
              'Kwartaalmeeting Bedrijfsvoering. Een ochtend vol digitale innovatie, samenwerking en bits & bytes.',
              {
                date: '12 mei 2026',
                time: '10.20 - 10.40',
                location: workshopDetails.location || 'Stadskazerne',
              }
            ) +
            '<p class="participant-name">Welkom, ' + esc(info.name || 'collega') + '</p>' +
            '<div class="workshop-block">' +
              '<p class="eyebrow">Jouw workshop</p>' +
              '<p class="workshop-name">' + esc(info.assignedWorkshopName || info.assignedWorkshopId || 'Wordt nog bekend gemaakt') + '</p>' +
            '</div>' +
            (
              workshopDetails.location
                ? '<div class="info-block"><p><strong>Tijd:</strong> 10.20 - 10.40<br /><strong>Locatie:</strong> ' + esc(workshopDetails.location) + '</p></div>'
                : ''
            ) +
            (workshopDetails.extraInfo ? '<div class="info-block"><p>' + esc(workshopDetails.extraInfo) + '</p></div>' : '') +
            (
              workshopDetails.routeImageSrc
                ? '<div class="info-block route-image-block"><img src="' + esc(workshopDetails.routeImageSrc) + '" alt="' + esc(workshopDetails.routeImageAlt || 'Route afbeelding') + '" class="route-image" /></div>'
                : ''
            ) +
            (info.workshopInfo ? '<div class="info-block"><p>' + esc(info.workshopInfo) + '</p></div>' : '') +
            (info.welcomeInfoText ? '<div class="info-block"><p>' + esc(info.welcomeInfoText) + '</p></div>' : '') +
            '<div id="status" class="status ' + statusClass + '">' + esc(statusText) + '</div>' +
            (
              resetData && resetData.resetToken
                ? '<button id="resetBtn" class="secondary wide mt-sm">Verkeerde naam? Reset en kies opnieuw</button>'
                : ''
            ) +
          '</div>';

        if (resetData && resetData.resetToken) {
          document.getElementById('resetBtn').addEventListener('click', function () {
            var statusEl = document.getElementById('status');
            var resetBtn = document.getElementById('resetBtn');
            resetBtn.disabled = true;
            statusEl.className = 'status pending';
            statusEl.textContent = 'Check-in resetten...';

            fetch('/api/checkin/reset', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                participantId: resetData.participantId,
                resetToken: resetData.resetToken
              })
            })
              .then(function (r) {
                return r.json().then(function (j) { return { status: r.status, body: j }; });
              })
              .then(function (res) {
                if (res.status >= 400 || !res.body.ok) {
                  resetBtn.disabled = false;
                  statusEl.className = 'status error';
                  statusEl.textContent = (res.body && res.body.error) || 'Reset mislukt.';
                  return;
                }
                runSharedMode({
                  className: 'success',
                  text: 'Reset gelukt. Kies nu de juiste naam.'
                });
              })
              .catch(function () {
                resetBtn.disabled = false;
                statusEl.className = 'status error';
                statusEl.textContent = 'Geen verbinding met de server.';
              });
          });
        }
      }

      function renderSelect(participants, initialStatus) {
        view.innerHTML =
          '<div class="card welcome invite-card">' +
            renderHero('Nulletjes & Eendjes', 'Kwartaalmeeting Bedrijfsvoering. Een ochtend vol digitale innovatie, samenwerking en bits & bytes.') +
            '<label for="nameSearchInput" class="field-label">Jouw naam</label>' +
            '<div class="name-search-wrap" id="nameSearchWrap">' +
              '<input type="text" id="nameSearchInput" class="field-select name-search-input" placeholder="Typ je naam om te zoeken..." autocomplete="off" autocorrect="off" spellcheck="false" />' +
              '<ul id="nameDropdown" class="name-dropdown hidden"></ul>' +
            '</div>' +
            '<button id="continueBtn" class="primary wide mt-md" disabled>Ga naar mijn ticket</button>' +
            '<div id="formStatus" class="status pending hidden"></div>' +
          '</div>';

        if (initialStatus && initialStatus.text) {
          var initialStatusEl = document.getElementById('formStatus');
          initialStatusEl.classList.remove('hidden');
          initialStatusEl.className = 'status ' + (initialStatus.className || 'info');
          initialStatusEl.textContent = initialStatus.text;
        }

        var selectedParticipantId = '';
        var input = document.getElementById('nameSearchInput');
        var dropdown = document.getElementById('nameDropdown');
        var continueBtn = document.getElementById('continueBtn');
        var activeIndex = -1;

        function filterParticipants(query) {
          var q = query.trim().toLowerCase();
          if (!q) return [];
          return (participants || []).filter(function (p) {
            return p.name.toLowerCase().indexOf(q) !== -1;
          });
        }

        function setActiveItem(items, idx) {
          items.forEach(function (li, i) {
            li.classList.toggle('active', i === idx);
          });
          if (items[idx]) {
            items[idx].scrollIntoView({ block: 'nearest' });
          }
        }

        function showDropdown(filtered) {
          if (filtered.length === 0) {
            dropdown.innerHTML = '<li class="no-results">Geen resultaten gevonden</li>';
          } else {
            dropdown.innerHTML = filtered.map(function (p) {
              return '<li data-id="' + esc(p.participantId).replace(/"/g, '&quot;') + '">' + esc(p.name) + '</li>';
            }).join('');
          }
          dropdown.classList.remove('hidden');
          activeIndex = -1;
        }

        function hideDropdown() {
          dropdown.classList.add('hidden');
          activeIndex = -1;
        }

        function selectParticipant(p) {
          selectedParticipantId = p.participantId;
          input.value = p.name;
          hideDropdown();
          continueBtn.disabled = false;
        }

        function clearSelection() {
          selectedParticipantId = '';
          continueBtn.disabled = true;
        }

        input.addEventListener('input', function () {
          clearSelection();
          var val = input.value;
          if (!val.trim()) { hideDropdown(); return; }
          showDropdown(filterParticipants(val));
        });

        input.addEventListener('focus', function () {
          if (input.value.trim() && !selectedParticipantId) {
            showDropdown(filterParticipants(input.value));
          }
        });

        input.addEventListener('keydown', function (e) {
          var items = dropdown.querySelectorAll('li:not(.no-results)');
          if (dropdown.classList.contains('hidden') || items.length === 0) return;
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            activeIndex = Math.min(activeIndex + 1, items.length - 1);
            setActiveItem(items, activeIndex);
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            activeIndex = Math.max(activeIndex - 1, 0);
            setActiveItem(items, activeIndex);
          } else if (e.key === 'Enter') {
            e.preventDefault();
            if (activeIndex >= 0 && items[activeIndex]) {
              var id = items[activeIndex].getAttribute('data-id');
              var match = (participants || []).filter(function (x) { return x.participantId === id; })[0];
              if (match) selectParticipant(match);
            }
          } else if (e.key === 'Escape') {
            hideDropdown();
          }
        });

        dropdown.addEventListener('mousedown', function (e) {
          var li = e.target;
          while (li && li.tagName !== 'LI') li = li.parentElement;
          if (!li || li.classList.contains('no-results')) return;
          e.preventDefault();
          var id = li.getAttribute('data-id');
          var match = (participants || []).filter(function (x) { return x.participantId === id; })[0];
          if (match) selectParticipant(match);
        });

        document.addEventListener('click', function onClickOutside(e) {
          var wrap = document.getElementById('nameSearchWrap');
          if (!wrap) { document.removeEventListener('click', onClickOutside); return; }
          if (!wrap.contains(e.target)) hideDropdown();
        });

        continueBtn.addEventListener('click', function () {
          var statusEl = document.getElementById('formStatus');
          if (!selectedParticipantId) {
            statusEl.classList.remove('hidden');
            statusEl.className = 'status error';
            statusEl.textContent = 'Kies eerst je naam uit de lijst.';
            return;
          }
          statusEl.classList.remove('hidden');
          statusEl.className = 'status pending';
          statusEl.textContent = 'Ticket laden...';

          fetch('/api/checkin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ participantId: selectedParticipantId })
          })
            .then(function (r) {
              return r.json().then(function (j) { return { status: r.status, body: j }; });
            })
            .then(function (res) {
              if (res.status >= 400 || !res.body.ok) {
                statusEl.className = 'status error';
                statusEl.textContent = (res.body && res.body.error) || 'Kon je ticket niet laden.';
                return;
              }
              var info = res.body.participant || {};
              var text, cls;
              if (res.body.alreadyCheckedIn) {
                text = '✓ Je was al ingecheckt. Veel plezier!';
                cls = 'info';
              } else {
                text = '✓ Inchecken gelukt. Veel plezier!';
                cls = 'success';
              }
              renderWelcome(info, text, cls, {
                participantId: info.participantId,
                resetToken: res.body.resetToken
              });
            })
            .catch(function () {
              statusEl.className = 'status error';
              statusEl.textContent = 'Geen verbinding met de server.';
            });
        });
      }

      function runSharedMode(statusMessage) {
        view.innerHTML =
          '<div class="card invite-card">' +
            '<div class="big-icon">⏳</div>' +
            '<h1>Laden...</h1>' +
            '<p class="small">We laden de deelnemerslijst.</p>' +
          '</div>';

        fetch('/api/checkin')
          .then(function (r) {
            return r.json().then(function (j) { return { status: r.status, body: j }; });
          })
          .then(function (res) {
            if (res.status >= 400 || !res.body.ok) {
              renderError('Laden mislukt', (res.body && res.body.error) || 'Kan de deelnemerslijst niet ophalen.');
              return;
            }
            renderSelect(res.body.participants || [], statusMessage || null);
          })
          .catch(function () {
            renderError('Geen verbinding', 'Kan de server niet bereiken. Controleer je verbinding en probeer opnieuw.');
          });
      }

      function runTokenMode() {
        fetch('/api/checkin/' + encodeURIComponent(token), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        })
          .then(function (r) {
            return r.json().then(function (j) { return { status: r.status, body: j }; });
          })
          .then(function (res) {
            if (res.status === 404) {
              renderError('QR-code niet herkend', 'Dit ticket kon niet worden gevonden. Loop even langs de organisatie zodat we je kunnen helpen.');
              return;
            }
            if (res.status >= 400 || !res.body.ok) {
              renderError('Check-in mislukt', (res.body && res.body.error) || 'Er ging iets mis. Probeer opnieuw of meld je bij de organisatie.');
              return;
            }
            var info = res.body.participant || {};
            var text, cls;
            if (res.body.alreadyCheckedIn) {
              text = '✓ Je was al ingecheckt. Veel plezier!';
              cls = 'info';
            } else {
              text = '✓ Inchecken gelukt. Veel plezier!';
              cls = 'success';
            }
            renderWelcome(info, text, cls);
          })
          .catch(function () {
            renderError('Geen verbinding', 'Kan de server niet bereiken. Controleer je verbinding en probeer opnieuw.');
          });
      }

      if (token) runTokenMode();
      else runSharedMode();

      startDuckMatrix();
    })();
  </script>
</body>
</html>
