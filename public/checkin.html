<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Welkom bij de kwartaalmeeting</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="checkin-theme">
  <canvas id="duckMatrixCanvas" aria-hidden="true" class="duck-matrix-canvas"></canvas>
  <div class="floating-ducks" aria-hidden="true">
    <img src="/duck.png" alt="" class="floating-duck duck-a" />
    <img src="/duck.png" alt="" class="floating-duck duck-b" />
    <img src="/duck.png" alt="" class="floating-duck duck-c" />
  </div>

  <main class="wrap checkin-wrap">
    <div id="view"></div>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var token = (params.get('token') || '').trim();
      var view = document.getElementById('view');

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function renderError(title, body) {
        view.innerHTML =
          '<div class="card error invite-card">' +
            '<div class="big-icon">⚠️</div>' +
            '<h1>' + esc(title) + '</h1>' +
            '<p>' + esc(body) + '</p>' +
          '</div>';
      }

      function renderHero(title, intro) {
        return (
          '<div class="invite-hero">' +
            '<img src="/logo.png" alt="Kwartaalmeeting logo" class="hero-logo" />' +
            '<p class="eyebrow">Kwartaalmeeting bedrijfsvoering</p>' +
            '<h1>' + esc(title) + '</h1>' +
            (intro ? '<p class="small hero-intro">' + esc(intro) + '</p>' : '') +
            '<div class="hero-meta">' +
              '<span class="meta-pill">📅 12 mei 2026</span>' +
              '<span class="meta-pill">🕘 08:45 - 13:00</span>' +
              '<span class="meta-pill">📍 Stadskazerne</span>' +
            '</div>' +
          '</div>'
        );
      }

      function startDuckMatrix() {
        var canvas = document.getElementById('duckMatrixCanvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');

        function setCanvasSize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        setCanvasSize();

        var chars = ['0', 'DUCK'];
        var fontSize = 24;
        var drops = [];

        var duckImg = new Image();
        duckImg.src = '/duck.png';

        function resetDrops() {
          var columns = Math.floor(canvas.width / fontSize) + 1;
          drops = [];
          for (var x = 0; x < columns; x++) {
            drops[x] = Math.random() * -100;
          }
        }
        resetDrops();

        function draw() {
          ctx.fillStyle = 'rgba(0, 21, 43, 0.1)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.font = fontSize + 'px monospace';

          for (var i = 0; i < drops.length; i++) {
            var text = chars[Math.floor(Math.random() * chars.length)];
            if (text === 'DUCK') {
              if (duckImg.complete && duckImg.naturalWidth > 0) {
                ctx.drawImage(duckImg, i * fontSize, drops[i] * fontSize - fontSize * 0.8, fontSize, fontSize);
              }
            } else {
              ctx.fillStyle = '#009BDF';
              ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            }
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
              drops[i] = 0;
            }
            drops[i]++;
          }
        }

        var interval = setInterval(draw, 50);

        window.addEventListener('resize', function() {
          setCanvasSize();
          resetDrops();
        });
      }

      function renderWelcome(info, statusText, statusClass, resetData) {
        view.innerHTML =
          '<div class="card welcome invite-card">' +
            renderHero('Nulletjes & Eendjes', 'Kwartaalmeeting Bedrijfsvoering. Een ochtend vol digitale innovatie, samenwerking en bits & bytes.') +
            '<p class="participant-name">Welkom, ' + esc(info.name || 'collega') + '</p>' +
            '<div class="workshop-block">' +
              '<p class="eyebrow">Jouw workshop</p>' +
              '<p class="workshop-name">' + esc(info.assignedWorkshopName || info.assignedWorkshopId || 'Wordt nog bekend gemaakt') + '</p>' +
            '</div>' +
            (info.workshopInfo ? '<div class="info-block"><p>' + esc(info.workshopInfo) + '</p></div>' : '') +
            (info.welcomeInfoText ? '<div class="info-block"><p>' + esc(info.welcomeInfoText) + '</p></div>' : '') +
            '<div id="status" class="status ' + statusClass + '">' + esc(statusText) + '</div>' +
            (
              resetData && resetData.resetToken
                ? '<button id="resetBtn" class="secondary wide mt-sm">Verkeerde naam? Reset en kies opnieuw</button>'
                : ''
            ) +
          '</div>';

        if (resetData && resetData.resetToken) {
          document.getElementById('resetBtn').addEventListener('click', function () {
            var statusEl = document.getElementById('status');
            var resetBtn = document.getElementById('resetBtn');
            resetBtn.disabled = true;
            statusEl.className = 'status pending';
            statusEl.textContent = 'Check-in resetten...';

            fetch('/api/checkin/reset', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                participantId: resetData.participantId,
                resetToken: resetData.resetToken
              })
            })
              .then(function (r) {
                return r.json().then(function (j) { return { status: r.status, body: j }; });
              })
              .then(function (res) {
                if (res.status >= 400 || !res.body.ok) {
                  resetBtn.disabled = false;
                  statusEl.className = 'status error';
                  statusEl.textContent = (res.body && res.body.error) || 'Reset mislukt.';
                  return;
                }
                runSharedMode({
                  className: 'success',
                  text: 'Reset gelukt. Kies nu de juiste naam.'
                });
              })
              .catch(function () {
                resetBtn.disabled = false;
                statusEl.className = 'status error';
                statusEl.textContent = 'Geen verbinding met de server.';
              });
          });
        }
      }

      function renderSelect(participants, initialStatus) {
        var options = (participants || []).map(function (p) {
          return '<option value="' + esc(p.participantId).replace(/"/g, '&quot;') + '">' + esc(p.name) + '</option>';
        }).join('');

        view.innerHTML =
          '<div class="card welcome invite-card">' +
            renderHero('Nulletjes & Eendjes', 'Kwartaalmeeting Bedrijfsvoering. Een ochtend vol digitale innovatie, samenwerking en bits & bytes.') +
            '<label for="participantId" class="field-label">Jouw naam</label>' +
            '<select id="participantId" class="field-select">' +
              '<option value="">-- Kies je naam --</option>' +
              options +
            '</select>' +
            '<button id="continueBtn" class="primary wide mt-md">Ga naar mijn ticket</button>' +
            '<div id="formStatus" class="status pending hidden"></div>' +
          '</div>';

        if (initialStatus && initialStatus.text) {
          var initialStatusEl = document.getElementById('formStatus');
          initialStatusEl.classList.remove('hidden');
          initialStatusEl.className = 'status ' + (initialStatus.className || 'info');
          initialStatusEl.textContent = initialStatus.text;
        }

        document.getElementById('continueBtn').addEventListener('click', function () {
          var participantId = document.getElementById('participantId').value;
          var statusEl = document.getElementById('formStatus');
          if (!participantId) {
            statusEl.classList.remove('hidden');
            statusEl.className = 'status error';
            statusEl.textContent = 'Kies eerst je naam uit de lijst.';
            return;
          }
          statusEl.classList.remove('hidden');
          statusEl.className = 'status pending';
          statusEl.textContent = 'Ticket laden...';

          fetch('/api/checkin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ participantId: participantId })
          })
            .then(function (r) {
              return r.json().then(function (j) { return { status: r.status, body: j }; });
            })
            .then(function (res) {
              if (res.status >= 400 || !res.body.ok) {
                statusEl.className = 'status error';
                statusEl.textContent = (res.body && res.body.error) || 'Kon je ticket niet laden.';
                return;
              }
              var info = res.body.participant || {};
              var text;
              var cls;
              if (res.body.alreadyCheckedIn) {
                text = '✓ Je was al ingecheckt. Veel plezier!';
                cls = 'info';
              } else {
                text = '✓ Inchecken gelukt. Veel plezier!';
                cls = 'success';
              }
              renderWelcome(info, text, cls, {
                participantId: info.participantId,
                resetToken: res.body.resetToken
              });
            })
            .catch(function () {
              statusEl.className = 'status error';
              statusEl.textContent = 'Geen verbinding met de server.';
            });
        });
      }

      function runSharedMode(statusMessage) {
        view.innerHTML =
          '<div class="card invite-card">' +
            '<div class="big-icon">⏳</div>' +
            '<h1>Laden...</h1>' +
            '<p class="small">We laden de deelnemerslijst.</p>' +
          '</div>';

        fetch('/api/checkin')
          .then(function (r) {
            return r.json().then(function (j) { return { status: r.status, body: j }; });
          })
          .then(function (res) {
            if (res.status >= 400 || !res.body.ok) {
              renderError('Laden mislukt', (res.body && res.body.error) || 'Kan de deelnemerslijst niet ophalen.');
              return;
            }
            renderSelect(res.body.participants || [], statusMessage || null);
          })
          .catch(function () {
            renderError('Geen verbinding', 'Kan de server niet bereiken. Controleer je verbinding en probeer opnieuw.');
          });
      }

      function runTokenMode() {
        fetch('/api/checkin/' + encodeURIComponent(token), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        })
          .then(function (r) {
            return r.json().then(function (j) { return { status: r.status, body: j }; });
          })
          .then(function (res) {
            if (res.status === 404) {
              renderError('QR-code niet herkend', 'Dit ticket kon niet worden gevonden. Loop even langs de organisatie zodat we je kunnen helpen.');
              return;
            }
            if (res.status >= 400 || !res.body.ok) {
              renderError('Check-in mislukt', (res.body && res.body.error) || 'Er ging iets mis. Probeer opnieuw of meld je bij de organisatie.');
              return;
            }
            var info = res.body.participant || {};
            var text, cls;
            if (res.body.alreadyCheckedIn) {
              text = '✓ Je was al ingecheckt. Veel plezier!';
              cls = 'info';
            } else {
              text = '✓ Inchecken gelukt. Veel plezier!';
              cls = 'success';
            }
            renderWelcome(info, text, cls);
          })
          .catch(function () {
            renderError('Geen verbinding', 'Kan de server niet bereiken. Controleer je verbinding en probeer opnieuw.');
          });
      }

      if (token) runTokenMode();
      else runSharedMode();

      startDuckMatrix();
    })();
  </script>
</body>
</html>
