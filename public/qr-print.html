<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>QR-codes printen</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="qr-print">
  <div class="no-print" style="max-width:1000px; margin:16px auto; padding:0 18px; display:flex; gap:8px; align-items:center; flex-wrap:wrap">
    <h1 style="margin:0; font-size:20px">Gedeelde check-in QR-code</h1>
    <span style="flex:1"></span>
    <button class="primary" onclick="window.print()">Printen</button>
    <a class="secondary" href="/admin">← Terug naar dashboard</a>
  </div>

  <div class="no-print" style="max-width:1000px; margin:0 auto 12px; padding:0 18px;">
    <div style="background:#fff; border:1px solid var(--border); border-radius:12px; padding:12px 14px;">
      <div style="font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:600;">Check-in URL</div>
      <div id="qrUrlLabel" style="margin-top:6px; word-break:break-all;"></div>
    </div>
  </div>

  <div class="qr-grid" id="grid">
    <div class="qr-card duck-theme-card">
      <div class="duck-deco tl">🦆</div>
      <div class="duck-deco tr">🐥</div>
      <div class="duck-deco bl">🐤</div>
      <div class="duck-deco br">🦆</div>
      <img class="duck-qr" src="/api/qr/shared?size=420" alt="Gedeelde check-in QR" />
      <h2>Kwartaalmeeting check-in</h2>
      <p>Scan deze QR-code en kies je naam.</p>
      <p id="printUrlLabel" style="font-size:11px; color:#888; word-break:break-all"></p>
    </div>
  </div>

  <script>
    var checkinUrl = location.origin + '/checkin';
    document.getElementById('qrUrlLabel').textContent = checkinUrl;
    document.getElementById('printUrlLabel').textContent = checkinUrl;
  </script>
</body>
</html>
